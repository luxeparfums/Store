<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxe Parfums</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Tajawal:wght@400;700&display=swap');

body {
  margin: 0;
  font-family: 'Tajawal','Cairo', sans-serif;
  direction: rtl;
  overflow-x: hidden;
  background: #f5f5f5;
}

/* 🔴 TOP BAR */
.top-bar {
  position: fixed;
  top: 0;
  width: 100%;
  color: white;
  padding: 10px 0;
  font-weight: bold;
  overflow: hidden;
  z-index: 1000;
  background: linear-gradient(270deg, #ff0000, #ff4d4d, #cc0000);
}

.top-track {
  display: flex;
  width: max-content;
  animation: scrollX 9s linear infinite;
}
.top-track span { padding: 0 50px; }

@keyframes scrollX {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* 🔥 PACK */
.pack-showcase {
  margin: 90px auto 20px;
  text-align: center;
}

.pack-img {
  width: 260px;
  border-radius: 15px;
  transition: 0.4s;
}
.pack-img:active {
  transform: scale(1.08);
}

/* ✨ TABLES */
.tables {
  max-width: 600px;
  margin: auto;
}

/* بنات */
.girls {
  background: linear-gradient(135deg, #ffe6f0, #ffd6eb);
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 20px;
  box-shadow: 0 0 20px rgba(255,100,180,0.3);
  animation: glowPink 3s infinite alternate;
}

/* رجال */
.men {
  background: linear-gradient(135deg, #e6f0ff, #d6e6ff);
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 0 20px rgba(0,120,255,0.3);
  animation: glowBlue 3s infinite alternate;
}

@keyframes glowPink {
  from { box-shadow: 0 0 10px rgba(255,100,180,0.2); }
  to { box-shadow: 0 0 25px rgba(255,100,180,0.5); }
}

@keyframes glowBlue {
  from { box-shadow: 0 0 10px rgba(0,120,255,0.2); }
  to { box-shadow: 0 0 25px rgba(0,120,255,0.5); }
}

/* rows */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  background: rgba(255,255,255,0.7);
  border-radius: 10px;
  margin: 8px 0;
}

/* icons */
.icon {
  width: 45px;
  height: 45px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}
.icon:hover {
  transform: scale(1.2);
}

/* popup */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}
.popup img {
  width: 300px;
  border-radius: 15px;
}

/* wrapper */
.wrapper {
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 95%;
  max-width: 650px;
  padding: 40px;
  border-radius: 25px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(14px);
  text-align: center;
}

.logo {
  width: 95px;
  border-radius: 50%;
}

button {
  width: 100%;
  padding: 15px;
  background: black;
  color: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="top-bar">
  <div class="top-track">
    <span>🚚 توصيل مجاني 🇲🇦</span>
    <span>🚚 توصيل مجاني 🇲🇦</span>
  </div>
</div>

<!-- 🔥 PACK -->
<div class="pack-showcase">
  <img src="https://www.image2url.com/r2/default/images/1777509414279-f0d6f490-d80b-42fc-a1a1-251d36a60708.png" class="pack-img">
</div>

<!-- 💎 TABLES -->
<div class="tables">

  <!-- 💗 بنات -->
  <div class="girls">
    <h3>💗 باك عطور بنات</h3>

    <div class="row">
      <span>Kayali</span>
      <img src="https://i.imgur.com/1.jpg" class="icon" onclick="showImg(this.src)">
    </div>

    <div class="row">
      <span>Candy Love</span>
      <img src="https://i.imgur.com/2.jpg" class="icon" onclick="showImg(this.src)">
    </div>

    <div class="row">
      <span>L’interdit</span>
      <img src="https://i.imgur.com/3.jpg" class="icon" onclick="showImg(this.src)">
    </div>
  </div>

  <!-- 💙 رجال -->
  <div class="men">
    <h3>💙 باك عطور رجال</h3>

    <div class="row">
      <span>Sauvage</span>
      <img src="https://i.imgur.com/4.jpg" class="icon" onclick="showImg(this.src)">
    </div>

    <div class="row">
      <span>Bleu de Chanel</span>
      <img src="https://i.imgur.com/5.jpg" class="icon" onclick="showImg(this.src)">
    </div>

    <div class="row">
      <span>Stronger With You Intensely</span>
      <img src="https://i.imgur.com/6.jpg" class="icon" onclick="showImg(this.src)">
    </div>
  </div>

</div>

<!-- popup -->
<div class="popup" id="popup" onclick="this.style.display='none'">
  <img id="popupImg">
</div>

<script>
function showImg(src){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popupImg").src = src;
}
</script>

</body>
</html>
