<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Luxe Parfums</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  margin-top: 50px;
}

h1 {
  color: gold;
}

select, input {
  display: block;
  margin: 10px auto;
  padding: 12px;
  width: 260px;
  border-radius: 5px;
  border: none;
  font-size: 14px;
}

button {
  margin-top: 20px;
  padding: 15px 30px;
  background: gold;
  border: none;
  font-size: 18px;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: orange;
}
</style>

</head>

<body>

<div class="container">
  <h1>Luxe Parfums</h1>

  <p>اختر الباك ديالك وعمّر المعلومات 👇</p>

  <!-- اختيار الباك -->
  <select id="product">
    <option value="باك 3 عطور بنات - 119dh">باك 3 عطور بنات - 119dh</option>
    <option value="باك 3 عطور رجال - 119dh">باك 3 عطور رجال - 119dh</option>
  </select>

  <!-- الاسم -->
  <input type="text" id="name" placeholder="الاسم الكامل">

  <!-- العنوان -->
  <input type="text" id="address" placeholder="العنوان الكامل">

  <!-- الهاتف -->
  <input type="text" id="phone" placeholder="رقم الهاتف">

  <button onclick="sendOrder()">اطلب الآن</button>
</div>

<script>
function sendOrder() {
  let product = document.getElementById("product").value;
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let phone = document.getElementById("phone").value;

  if(name === "" || address === "" || phone === ""){
    alert("عمر جميع المعلومات من فضلك");
    return;
  }

  let message = `طلب جديد:%0A
📦 المنتج: ${product}%0A
👤 الاسم: ${name}%0A
📍 العنوان: ${address}%0A
📞 الهاتف: ${phone}`;

  window.location.href = `https://wa.me/212XXXXXXXXX?text=${message}`;
}
</script>

</body>
</html>
