<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Luxe Parfums</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  direction: rtl;
}

/* 🔴 Top banner */
.top-bar {
  position: fixed;
  top: 0;
  width: 100%;
  background: red;
  color: white;
  padding: 8px 0;
  font-size: 14px;
  font-weight: bold;
  overflow: hidden;
  white-space: nowrap;
}

.top-bar span {
  display: inline-block;
  padding-left: 100%;
  animation: moveText 12s linear infinite;
}

@keyframes moveText {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* Glass Effect */
.container {
  width: 350px;
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.6);
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  text-align: center;
  margin-top: 40px;
}

h1 {
  margin-bottom: 10px;
  color: #222;
}

p {
  color: #555;
}

select, input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.8);
  font-size: 14px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: black;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #333;
}
</style>

</head>

<body>

<!-- 🔴 Top banner -->
<div class="top-bar">
  <span>🚚 توصيل مجاني في المغرب كامل 🇲🇦✨ — توصيل مجاني في المغرب كامل 🇲🇦✨ —</span>
</div>

<div class="container">
  <h1>Luxe Parfums</h1>
  <p>اختر الباك وعمّر المعلومات</p>

  <select id="product">
    <option value="باك 3 عطور بنات - 119dh">باك 3 عطور بنات - 119dh</option>
    <option value="باك 3 عطور رجال - 119dh">باك 3 عطور رجال - 119dh</option>
  </select>

  <input type="text" id="name" placeholder="الاسم الكامل">
  <input type="text" id="address" placeholder="العنوان الكامل">
  <input type="text" id="phone" placeholder="رقم الهاتف">

  <button onclick="sendOrder()">اطلب الآن</button>
</div>

<script>
function sendOrder() {
  let product = document.getElementById("product").value;
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let phone = document.getElementById("phone").value;

  if(name === "" || address === "" || phone === ""){
    alert("عمر جميع المعلومات من فضلك");
    return;
  }

  let message = `طلب جديد:%0A
📦 المنتج: ${product}%0A
👤 الاسم: ${name}%0A
📍 العنوان: ${address}%0A
📞 الهاتف: ${phone}`;

  window.location.href = `https://wa.me/212XXXXXXXXX?text=${message}`;
}
</script>

</body>
</html>
