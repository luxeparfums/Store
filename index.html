<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE PARFUMS</title>

<style>

/* ===== FONT & BASE ===== */
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: white;
  overflow-x:hidden;
}

/* ===== BACKGROUND ANIMATION ===== */
.bg {
  position: fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.blob {
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  filter: blur(120px);
  opacity:0.6;
  animation: float 10s infinite alternate;
}

.red { background:red; top:20%; left:10%; }
.blue { background:blue; top:50%; left:60%; }
.yellow { background:yellow; top:70%; left:20%; }

@keyframes float {
  from { transform:translate(0,0); }
  to { transform:translate(100px,-100px); }
}

/* ===== TOP BAR ===== */
.top {
  background:red;
  color:white;
  text-align:center;
  padding:10px;
  font-size:18px;
}

/* ===== HERO ===== */
.hero {
  text-align:center;
  padding:80px 20px;
}
.hero h1 {
  font-size:40px;
}
.hero p {
  font-size:18px;
}

/* ===== GLASS ===== */
.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.5);
  margin:20px;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.1);
}

/* ===== PACKS ===== */
.pack {
  margin:15px;
  padding:20px;
  cursor:pointer;
  font-size:18px;
  border-radius:15px;
  transition:0.3s;
}

.pack:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

/* ===== BUTTON ===== */
.btn {
  background:#007aff;
  color:white;
  padding:15px;
  border:none;
  border-radius:15px;
  font-size:18px;
  margin-top:10px;
}

/* ===== PERFUME LIST ===== */
.item {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #ddd;
}

.plus {
  background:green;
  color:white;
  border:none;
  border-radius:50%;
  width:35px;
  height:35px;
  font-size:20px;
}

/* ===== ORDER ===== */
input {
  width:90%;
  padding:15px;
  margin:10px;
  border-radius:10px;
  border:none;
  background:#f5f5f5;
}

/* ===== FIXED BUTTON ===== */
.fixed {
  position:fixed;
  bottom:20px;
  right:20px;
  background:rgba(0,255,100,0.3);
  padding:15px;
  border-radius:50px;
  box-shadow:0 0 20px green;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="bg">
  <div class="blob red"></div>
  <div class="blob blue"></div>
  <div class="blob yellow"></div>
</div>

<div class="top">🚚 التوصيل متوفر في جميع أنحاء المغرب</div>

<div class="hero">
<h1>💎 LUXE PARFUMS</h1>
<p>الفخامة تبدأ من عطرك ✨</p>
</div>

<!-- PACKS -->
<div class="glass">
<h2>🔥 Packs</h2>

<div class="pack" onclick="choosePack('3h',3)">
💼 Pack Homme 3 = 99DH
</div>

<div class="pack" onclick="choosePack('3f',3)">
💖 Pack Femme 3 = 99DH
</div>

<div class="pack" onclick="choosePack('6',6)">
👑 Pack Complet 6 = 149DH
</div>

<button class="btn" onclick="showPerfumes()">✨ اختار عطرك</button>
</div>

<!-- PERFUMES -->
<div class="glass" id="perfumes" style="display:none;">
<h2>🌸 اختار العطور</h2>

<div id="list"></div>

<p>عدد المختار: <span id="count">0</span></p>
</div>

<!-- ORDER -->
<div class="glass">
<h2>📦 الطلب</h2>

<input id="name" placeholder="الاسم">
<input id="address" placeholder="العنوان">
<input id="phone" placeholder="الهاتف">

<button class="btn" onclick="send()">📲 اطلب الآن</button>
</div>

<a href="#top" class="fixed">🛒 طلب</a>

<script>

let packType = "";
let max = 0;
let selected = [];

const data = {
  hommes: ["Sauvage","Bleu de Chanel","Stronger With You"],
  femmes: ["Candy Love","L'interdit","Kayali"]
};

function choosePack(type, m){
  packType = type;
  max = m;
  selected = [];
  alert("تم اختيار الباك ✅");
}

function showPerfumes(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  let perfumes = [];

  if(packType == "3h") perfumes = data.hommes;
  if(packType == "3f") perfumes = data.femmes;
  if(packType == "6") perfumes = data.hommes.concat(data.femmes);

  perfumes.forEach(p => {
    list.innerHTML += `
      <div class="item">
        ${p}
        <button class="plus" onclick="add('${p}')">+</button>
      </div>
    `;
  });

  document.getElementById("perfumes").style.display = "block";
}

function add(p){
  if(selected.length >= max){
    alert("🚫 وصلت للحد الأقصى");
    return;
  }
  selected.push(p);
  document.getElementById("count").innerText = selected.length;
}

function send(){

if(selected.length != max){
  alert("⚠️ خاصك تكمل الاختيار");
  return;
}

let msg =
"طلب جديد 💎\n" +
"الاسم: " + name.value + "\n" +
"العنوان: " + address.value + "\n" +
"الهاتف: " + phone.value + "\n" +
"الباك: " + packType + "\n" +
"العطور: " + selected.join(", ");

window.open("https://wa.me/212725607282?text=" + encodeURIComponent(msg));

}

</script>

</body>
</html>
