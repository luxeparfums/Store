<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE PARFUMS</title>

<style>

/* ===== BASE ===== */
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont;
background:#fff;
color:#111;
overflow-x:hidden;
}

/* ===== BACKGROUND ===== */
.bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.blob{
position:absolute;
width:350px;
height:350px;
border-radius:50%;
filter:blur(120px);
opacity:0.5;
animation:move 10s infinite alternate;
}

.red{background:#ff3b30; top:10%; left:5%;}
.blue{background:#007aff; top:60%; left:60%;}
.gold{background:#ffd700; top:70%; left:20%;}

@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(120px,-120px);}
}

/* ===== TOP ===== */
.top{
background:#ff3b30;
color:white;
text-align:center;
padding:10px;
}

/* ===== HERO ===== */
.hero{
text-align:center;
padding:70px 20px;
}

.hero h1{
font-size:40px;
display:inline-block;
padding:10px 25px;
border-radius:15px;
background:rgba(0,0,0,0.75);
color:gold;
backdrop-filter: blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.hero p{
font-size:16px;
}

/* ===== GLASS ===== */
.glass{
backdrop-filter:blur(25px);
background:rgba(255,255,255,0.5);
margin:20px;
padding:25px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* ===== PACK ===== */
.pack{
text-align:center;
margin:15px 0;
}

.pack img{
width:100%;
border-radius:20px;
margin-bottom:10px;
}

/* ===== PERFUME ITEM ===== */
.item{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

/* ===== PLUS ===== */
.plus{
background:linear-gradient(45deg,gold,white);
border:none;
width:40px;
height:40px;
border-radius:50%;
font-size:18px;
cursor:pointer;
position:relative;
overflow:hidden;
transition:0.2s;
}

.plus:active{
transform:scale(0.85);
}

/* ===== INPUT ===== */
input,select{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
background:#f5f5f5;
}

/* ===== BUTTON (APPLE STYLE) ===== */
.btn{
background:black;
color:gold;
padding:15px;
border-radius:15px;
border:none;
font-size:18px;
cursor:pointer;
position:relative;
overflow:hidden;
transition:transform 0.15s ease, box-shadow 0.2s ease;
}

/* Apple press animation */
.btn:active{
transform:scale(0.9);
animation:bounce 0.25s ease;
box-shadow:0 0 20px rgba(255,215,0,0.4);
}

@keyframes bounce{
0%{transform:scale(1);}
50%{transform:scale(0.85);}
100%{transform:scale(0.9);}
}

/* ripple */
.btn::after{
content:"";
position:absolute;
width:140px;
height:140px;
background:rgba(255,255,255,0.35);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
opacity:0;
transition:0.4s;
}

.btn:active::after{
transform:translate(-50%,-50%) scale(2.5);
opacity:0;
}

/* ===== FOOTER ===== */
footer{
text-align:center;
padding:30px;
color:#777;
}

footer span{
color:gold;
text-shadow:0 0 10px gold;
}

</style>
</head>

<body>

<div class="bg">
<div class="blob red"></div>
<div class="blob blue"></div>
<div class="blob gold"></div>
</div>

<div class="top">🚚 التوصيل متوفر في جميع أنحاء المغرب</div>

<div class="hero">
<h1>LUXE PARFUMS</h1>
<p>الفخامة تبدأ من عطرك ✨</p>
</div>

<!-- ORDER -->
<div class="glass">
<h2>📦 الطلب</h2>

<input id="name" placeholder="الاسم">
<input id="address" placeholder="العنوان">
<input id="phone" placeholder="الهاتف">

<button class="btn" onclick="haptic(); send()">📲 اطلب الآن</button>
</div>

<footer>
© <span>LUXE PARFUMS</span>
</footer>

<script>

/* 📳 vibration iPhone style */
function haptic(){
if(navigator.vibrate){
navigator.vibrate([20, 10, 20]);
}
}

/* send function (demo) */
function send(){
alert("تم إرسال الطلب 💎");
}

</script>

</body>
</html>
