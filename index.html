<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxe Parfums</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: radial-gradient(circle at top, #ffffff, #dcdcdc);
  direction: rtl;
  overflow-x: hidden;
}

/* 🔴 Top bar */
.top-bar {
  position: fixed;
  top: 0;
  width: 100%;
  background: red;
  color: white;
  padding: 10px 0;
  font-weight: bold;
  overflow: hidden;
  white-space: nowrap;
  z-index: 1000;
}

.top-bar span {
  display: inline-block;
  padding-left: 100%;
  animation: move 12s linear infinite;
}

@keyframes move {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* 🌟 animated background glow */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 450px;
  height: 450px;
  filter: blur(160px);
  opacity: 0.25;
  z-index: -1;
}

body::before {
  background: gold;
  top: -120px;
  left: -120px;
  animation: floatGlow 8s ease-in-out infinite;
}

body::after {
  background: black;
  bottom: -150px;
  right: -120px;
  animation: floatGlow2 10s ease-in-out infinite;
}

@keyframes floatGlow {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(40px); }
}

@keyframes floatGlow2 {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-40px); }
}

/* wrapper fade-in */
.wrapper {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 100px 20px 60px;
  animation: fadeIn 1.2s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 💎 Glass card */
.container {
  width: 95%;
  max-width: 650px;
  padding: 40px;
  border-radius: 25px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(18px);
  box-shadow: 0 10px 50px rgba(0,0,0,0.2);
  text-align: center;
}

/* 🔥 logo floating */
.logo {
  width: 95px;
  height: 95px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid white;
  margin-top: -80px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* title animation */
h1 {
  font-size: 34px;
  margin: 10px 0 5px;
  color: #111;
  animation: slideDown 1s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

.subtitle {
  color: #555;
  margin-bottom: 20px;
  animation: fadeIn 1.5s ease;
}

/* inputs */
select, input {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  outline: none;
  background: rgba(255,255,255,0.9);
  transition: 0.3s;
}

/* input hover animation */
select:focus, input:focus {
  transform: scale(1.02);
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* button animation */
button {
  width: 100%;
  padding: 18px;
  margin-top: 15px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #000, #333);
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
  animation: fadeIn 2s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* footer */
.footer {
  margin-top: 20px;
  font-size: 13px;
  color: #444;
  animation: fadeIn 2.5s ease;
}

</style>

</head>

<body>

<div class="top-bar">
  <span>🚚 توصيل مجاني في المغرب كامل 🇲🇦✨ — توصيل مجاني في المغرب كامل 🇲🇦✨ —</span>
</div>

<div class="wrapper">
<div class="container">

  <img class="logo" src="https://www.image2url.com/r2/default/images/1777121061538-d7695421-9afb-45a4-b469-fabca21cd8bd.png" alt="logo">

  <h1>Luxe Parfums</h1>
  <div class="subtitle">عطور فاخرة بتجربة راقية ✨</div>

  <select id="product">
    <option value="باك 3 عطور بنات - 119dh">باك 3 عطور بنات - 119dh</option>
    <option value="باك 3 عطور رجال - 119dh">باك 3 عطور رجال - 119dh</option>
  </select>

  <input type="text" id="name" placeholder="الاسم الكامل">
  <input type="text" id="address" placeholder="العنوان الكامل">
  <input type="text" id="phone" placeholder="رقم الهاتف">

  <button onclick="sendOrder()">اطلب الآن</button>

  <div class="footer">
    © 2026 Luxe Parfums | جميع الحقوق محفوظة
  </div>

</div>
</div>

<script>
function sendOrder() {
  let product = document.getElementById("product").value;
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let phone = document.getElementById("phone").value;

  if(name === "" || address === "" || phone === ""){
    alert("عمر جميع المعلومات من فضلك");
    return;
  }

  let message = `طلب جديد:%0A
📦 المنتج: ${product}%0A
👤 الاسم: ${name}%0A
📍 العنوان: ${address}%0A
📞 الهاتف: ${phone}`;

  window.location.href = `https://wa.me/212725607282?text=${message}`;
}
</script>

</body>
</html>
