<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE PARFUMS</title>

<style>

/* ===== GENERAL ===== */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #ffffff;
  color: #111;
  scroll-behavior: smooth;
}

/* ===== TOP BAR ===== */
.top-bar {
  position: fixed;
  top: 0;
  width: 100%;
  background: red;
  color: white;
  text-align: center;
  padding: 8px;
  z-index: 999;
}

/* ===== HERO ===== */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  padding-top: 40px;
}

.hero h1 {
  font-size: 40px;
  letter-spacing: 2px;
}

.hero p {
  opacity: 0.6;
}

/* ===== GLASS EFFECT ===== */
.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.4);
  border-radius: 20px;
  padding: 20px;
  margin: 20px;
  transition: 0.4s;
}

/* ===== GLOW HOVER ===== */
.glass:hover {
  box-shadow: 0 0 30px rgba(0,0,0,0.1);
  transform: translateY(-5px);
}

/* ===== PACKS ===== */
.packs {
  text-align: center;
}

.pack {
  display: inline-block;
  margin: 10px;
  cursor: pointer;
}

/* ===== COLORS ===== */
.men { background: #eaf2ff; }
.women { background: #ffeaf2; }

/* ===== CHECKBOX STYLE ===== */
label {
  display: block;
  margin: 10px;
  cursor: pointer;
}

/* ===== ORDER ===== */
.order input, select {
  width: 80%;
  padding: 12px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.7);
}

/* ===== BUTTON ===== */
.btn {
  background: #007aff;
  color: white;
  padding: 15px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

/* ===== FIXED BUTTON ===== */
.fixed-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,255,100,0.3);
  backdrop-filter: blur(10px);
  color: black;
  padding: 15px 20px;
  border-radius: 50px;
  box-shadow: 0 0 20px rgba(0,255,100,0.5);
  text-decoration: none;
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 30px;
}

/* ===== ANIMATION ===== */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<div class="top-bar">🚚 التوصيل متوفر في جميع أنحاء المغرب</div>

<!-- HERO -->
<section class="hero fade">
  <h1>LUXE PARFUMS</h1>
  <p>الفخامة تبدأ من عطرك ✨</p>
</section>

<!-- PACKS -->
<section class="packs fade">
  <div class="glass pack" onclick="selectPack('3h')">Pack 3 Homme</div>
  <div class="glass pack" onclick="selectPack('3f')">Pack 3 Femme</div>
  <div class="glass pack" onclick="selectPack('6')">Pack 6</div>
</section>

<!-- MEN -->
<section class="glass men fade" id="men">
<h2>عطور رجالية</h2>
<label><input type="checkbox" value="Sauvage"> Sauvage</label>
<label><input type="checkbox" value="Bleu de Chanel"> Bleu de Chanel</label>
<label><input type="checkbox" value="Stronger With You Intensely"> Stronger With You Intensely</label>
</section>

<!-- WOMEN -->
<section class="glass women fade" id="women">
<h2>عطور نسائية</h2>
<label><input type="checkbox" value="Candy Love"> Candy Love</label>
<label><input type="checkbox" value="L'interdit"> L'interdit</label>
<label><input type="checkbox" value="Kayali"> Kayali</label>
</section>

<!-- ORDER -->
<section class="glass order fade" id="order">
<h2>اطلب الآن</h2>

<input type="text" id="name" placeholder="الاسم">
<input type="text" id="address" placeholder="العنوان">
<input type="text" id="phone" placeholder="الهاتف">

<button class="btn" onclick="sendOrder()">اطلب الآن</button>
</section>

<a class="fixed-btn" href="#order">اطلب</a>

<footer>
<p>© LUXE PARFUMS</p>
<a href="https://www.instagram.com/luxe__parfumss?igsh=MWh3Y2Y3dngydDlydw%3D%3D&utm_source=qr">
Instagram
</a>
</footer>

<script>

/* ===== ANIMATION SCROLL ===== */
const faders = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  faders.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});

/* ===== PACK ===== */
let selectedPack = "";

function selectPack(p){
  selectedPack = p;
  document.getElementById("order").scrollIntoView({behavior:"smooth"});
}

/* ===== ORDER ===== */
function sendOrder(){

let name = document.getElementById("name").value;
let address = document.getElementById("address").value;
let phone = document.getElementById("phone").value;

let selected = [];
document.querySelectorAll("input:checked").forEach(el => {
  selected.push(el.value);
});

if(selectedPack == "3h" && selected.length != 3){
  alert("اختر 3 عطور رجالية");
  return;
}

if(selectedPack == "3f" && selected.length != 3){
  alert("اختر 3 عطور نسائية");
  return;
}

if(selectedPack == "6" && selected.length != 6){
  alert("اختر 6 عطور");
  return;
}

let msg =
"طلب جديد:\n" +
"الاسم: " + name + "\n" +
"العنوان: " + address + "\n" +
"الهاتف: " + phone + "\n" +
"الباك: " + selectedPack + "\n" +
"العطور: " + selected.join(", ");

window.open("https://wa.me/212725607282?text=" + encodeURIComponent(msg));

}

</script>

</body>
</html>
