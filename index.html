<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxe Parfums</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
  direction: rtl;
}

/* 🔴 Top bar */
.top-bar {
  position: fixed;
  top: 0;
  width: 100%;
  background: red;
  color: white;
  padding: 10px 0;
  font-size: 16px;
  font-weight: bold;
  overflow: hidden;
  white-space: nowrap;
  z-index: 1000;
}

.top-bar span {
  display: inline-block;
  padding-left: 100%;
  animation: moveText 12s linear infinite;
}

@keyframes moveText {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* 🌟 Center layout */
.wrapper {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 80px 20px;
}

/* 💎 Glass container responsive */
.container {
  width: 90%;
  max-width: 600px;
  padding: 40px;
  border-radius: 25px;
  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.65);
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  text-align: center;
}

h1 {
  font-size: 32px;
  color: #222;
}

p {
  font-size: 18px;
  color: #555;
}

/* Inputs */
select, input {
  width: 100%;
  padding: 15px;
  margin: 12px 0;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 16px;
  background: rgba(255,255,255,0.9);
}

/* Button */
button {
  width: 100%;
  padding: 18px;
  margin-top: 15px;
  border: none;
  border-radius: 14px;
  background: black;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  background: #333;
}

/* 📱 Mobile improvement */
@media (max-width: 600px) {
  .container {
    padding: 25px;
  }

  h1 {
    font-size: 24px;
  }

  p {
    font-size: 15px;
  }
}
</style>

</head>

<body>

<div class="top-bar">
  <span>🚚 توصيل مجاني في المغرب كامل 🇲🇦✨ — توصيل مجاني في المغرب كامل 🇲🇦✨ —</span>
</div>

<div class="wrapper">
<div class="container">

  <h1>Luxe Parfums</h1>
  <p>اختر الباك وعمّر المعلومات</p>

  <select id="product">
    <option value="باك 3 عطور بنات - 119dh">باك 3 عطور بنات - 119dh</option>
    <option value="باك 3 عطور رجال - 119dh">باك 3 عطور رجال - 119dh</option>
  </select>

  <input type="text" id="name" placeholder="الاسم الكامل">
  <input type="text" id="address" placeholder="العنوان الكامل">
  <input type="text" id="phone" placeholder="رقم الهاتف">

  <button onclick="sendOrder()">اطلب الآن</button>

</div>
</div>

<script>
function sendOrder() {
  let product = document.getElementById("product").value;
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let phone = document.getElementById("phone").value;

  if(name === "" || address === "" || phone === ""){
    alert("عمر جميع المعلومات من فضلك");
    return;
  }

  let message = `طلب جديد:%0A
📦 المنتج: ${product}%0A
👤 الاسم: ${name}%0A
📍 العنوان: ${address}%0A
📞 الهاتف: ${phone}`;

  window.location.href = `https://wa.me/212XXXXXXXXX?text=${message}`;
}
</script>

</body>
</html>
